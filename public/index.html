<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Wheel of PTri</title>

    <link rel="stylesheet" href="/style.css" />
</head>

<body>
    <main class="wheel-page">
        <section class="wheel-card">
            <div class="page-heading">
                <p class="eyebrow">
                    Private game
                </p>

                <h1>
                    Wheel of PTri
                </h1>

                <p class="subtitle">
                    Press the button to spin the wheel.
                </p>
            </div>

            <div id="modeBadge" class="mode-badge hidden">
                Chắc chắn là người đó rồi :D
            </div>

            <div class="wheel-wrapper">
                <canvas id="wheelCanvas" width="600" height="600"></canvas>

                <div class="wheel-pointer"></div>

                <div class="wheel-center">
                    SPIN
                </div>
            </div>

            <button id="spinButton" class="primary-button spin-button" type="button">
                Spin the wheel
            </button>

            <p id="resultText" class="result-text" aria-live="polite">
                Loading names...
            </p>

            <!-- Winner banner -->
            <section id="winnerBanner" class="winner-banner hidden" aria-live="polite">
                <div class="winner-banner-glow"></div>

                <span class="winner-sparkle sparkle-one">
                    ✦
                </span>

                <span class="winner-sparkle sparkle-two">
                    ✦
                </span>

                <span class="winner-sparkle sparkle-three">
                    ✦
                </span>

                <div class="winner-icon">
                    🏆
                </div>

                <p class="winner-label">
                    KẾT QUẢ VÒNG QUAY
                </p>

                <h2 class="winner-heading">
                    Chúc mừng anh Nhân đã chọn được:
                </h2>

                <div id="winnerName" class="winner-name">
                    Tên người chiến thắng
                </div>

                <p class="winner-message">
                    Một lựa chọn tuyệt vời dành cho anh Nhân!
                </p>

                <button id="closeBannerButton" class="winner-close-button" type="button">
                    Quay lần nữa
                </button>
            </section>
        </section>
    </main>

    <script src="/script.js"></script>
</body>

</html>
